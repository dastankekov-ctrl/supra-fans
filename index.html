 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supra Fans 🚗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  .bg-stars { position: fixed; inset: 0; z-index: 0; }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) infinite ease-in-out;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.8; }
  }

  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .channel {
    font-family: 'Bangers', cursive;
    font-size: 36px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #FFD700, #FF6B35, #FF0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    animation: fadeUp 0.8s 0.3s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Bubble */
  .bubble-container { margin-bottom: 10px; }
  .bubble {
    background: #fff;
    border-radius: 20px;
    padding: 14px 20px;
    max-width: 300px;
    text-align: center;
    position: relative;
    border: 3px solid #FFD700;
    animation: bubbleGlow 2s ease-in-out infinite;
  }
  @keyframes bubbleGlow {
    0%, 100% { border-color: #FFD700; }
    50% { border-color: #FF6B35; }
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    border: 10px solid transparent;
    border-top-color: #FFD700;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    border: 9px solid transparent;
    border-top-color: #fff;
    z-index: 1;
  }
  .bubble-text {
    font-family: 'Bangers', cursive;
    font-size: 20px;
    letter-spacing: 1px;
    color: #1a1a2e;
    line-height: 1.3;
    min-height: 28px;
  }
  .cursor {
    display: inline-block;
    width: 3px;
    height: 20px;
    background: #FF6B35;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Boy */
  .boy {
    animation: boyFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
    cursor: pointer;
  }
  @keyframes boyFloat {
    0%, 100% { transform: translateY(0px) rotate(-1deg); }
    50% { transform: translateY(-12px) rotate(1deg); }
  }
  .boy svg { width: 180px; height: 240px; }

  /* Buttons */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 30px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.8s 1.5s both;
  }
  .btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 12px 16px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 12px;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    color: white;
  }
  .btn:hover { transform: translateY(-4px) scale(1.05); }
  .btn:active { transform: scale(0.95); }
  .btn .icon { font-size: 26px; }

  .btn-sub {
    background: linear-gradient(135deg, #FF0000, #CC0000);
    box-shadow: 0 6px 20px rgba(255,0,0,0.4);
    padding: 14px 20px;
    font-size: 14px;
  }
  .btn-sub .icon { font-size: 30px; }
  .btn-like { background: linear-gradient(135deg, #1a73e8, #0d47a1); box-shadow: 0 6px 20px rgba(26,115,232,0.4); }
  .btn-bell { background: linear-gradient(135deg, #FF9800, #e65100); box-shadow: 0 6px 20px rgba(255,152,0,0.4); }
  .btn-share { background: linear-gradient(135deg, #00c853, #007b33); box-shadow: 0 6px 20px rgba(0,200,83,0.4); }
  .btn-comment { background: linear-gradient(135deg, #9c27b0, #6a0080); box-shadow: 0 6px 20px rgba(156,39,176,0.4); }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    pointer-events: none;
  }
  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

  /* Float emoji */
  .float-emoji {
    position: fixed;
    font-size: 30px;
    pointer-events: none;
    z-index: 999;
    animation: floatUp 1.2s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-160px) scale(1.5) rotate(20deg); }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall var(--dur) ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-top: 18px;
    animation: fadeUp 0.8s 2s both;
  }
  .stat { text-align: center; color: rgba(255,255,255,0.7); font-size: 12px; }
  .stat-num {
    font-family: 'Bangers', cursive;
    font-size: 24px;
    color: #FFD700;
    letter-spacing: 1px;
    display: block;
  }
</style>
</head>
<body>

  </div>

  <div class="actions">
    <!-- SUBSCRIBE — реалдуу YouTube шилтемеси -->
    <a class="btn btn-sub"
       href="https://www.youtube.com/@totoyo-k2s?sub_confirmation=1"
       target="_blank"
       onclick="floatEmojis(this,'🎉🔥🚀')">
      <span class="icon">▶️</span>
      SUBSCRIBE
    </a>

    <!-- LIKE — каналдын бетине өтөт -->
    <a class="btn btn-like"
       href="https://www.youtube.com/@totoyo-k2s"
       target="_blank"
       onclick="floatEmojis(this,'👍❤️🔥')">
      <span class="icon">👍</span>
      LIKE
    </a>

    <!-- BELL — subscribe + notification -->
    <a class="btn btn-bell"
       href="https://www.youtube.com/@totoyo-k2s?sub_confirmation=1"
       target="_blank"
       onclick="floatEmojis(this,'🔔⚡✨')">
      <span class="icon">🔔</span>
      BELL
    </a>

    <!-- SHARE -->
    <button class="btn btn-share" onclick="shareChannel()">
      <span class="icon">📤</span>

       href="https://www.youtube.com/@totoyo-k2s/community"

    <div class="stat"><span class="stat-num">370</span>Subscribers</div>
    <div class="stat"><span class="stat-num">342K</span>Views</div>
    <div class="stat"><span class="stat-num">5.5K</span>Likes</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 3 + 1;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*3+2}s;animation-delay:${Math.random()*4}s;`;
  starsEl.appendChild(s);
}

// Typewriter
const messages = [
  "Subscribe to Supra Fans! 🚗🔥",
  "Hit that LIKE button fr fr! 👍",
  "Turn on the BELL 🔔 Don't miss!",
  "Drop a COMMENT below! 💬",
  "SHARE with your car friends! 🚀",
  "We're going to 3 MILLION views! 🎯",
  "370 subs → let's get to 1000! 💪",
  "Toyota Supra is life! 🏎️",
  "Every like = algorithm boost! ⚡",
  "You're a legend for watching! ❤️",
];
let msgIdx = 0, charIdx = 0, typing = true, pause = 0;
const textEl = document.getElementById('bubble-text');

function typeWriter() {
  const cursor = '<span class="cursor"></span>';
  const msg = messages[msgIdx];
  if (pause > 0) { pause--; setTimeout(typeWriter, 60); return; }
  if (typing) {
    charIdx++;
    textEl.innerHTML = msg.slice(0, charIdx) + cursor;
    if (charIdx >= msg.length) { typing = false; pause = 28; }
    setTimeout(typeWriter, 55);
  } else {
    charIdx--;
    textEl.innerHTML = msg.slice(0, charIdx) + cursor;
    if (charIdx === 0) { typing = true; msgIdx = (msgIdx + 1) % messages.length; pause = 8; }
    setTimeout(typeWriter, 28);
  }
}
typeWriter();

// Float emojis
function floatEmojis(el, emojis) {
  confettiBurst();
  emojis.split('').forEach((e, i) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'float-emoji';
      div.textContent = e;
      const rect = el.getBoundingClientRect();
      div.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*60) + 'px';
      div.style.top = rect.top + 'px';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 1300);
    }, i * 100);
  });
}

// Share
function shareChannel() {
  const url = 'https://www.youtube.com/@totoyo-k2s';
  if (navigator.share) {
    navigator.share({ title: 'Supra Fans 🚗', text: 'Check out this fire car channel!', url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copied! Share it! 🚀'));
  }
  floatEmojis(document.querySelector('.btn-share'), '🚀💫🌟');
}

// Confetti
function confettiBurst() {
  const colors = ['#FF0000','#FFD700','#FF6B35','#00c853','#1a73e8','#9c27b0','#fff'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};--dur:${Math.random()*1.5+1}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>0.5?'50%':'2px'};width:${Math.random()*10+6}px;height:${Math.random()*10+6}px;`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2500);
    }, i * 30);
  }
}

// Boy click
document.getElementById('boy').addEventListener('click', () => {
  const emojis = ['🚗','🔥','💨','⚡','🏎️'];
  const e = document.createElement('div');
  e.className = 'float-emoji';
  e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left = (window.innerWidth/2) + 'px';
  e.style.top = (window.innerHeight/2) + 'px';
  document.body.appendChild(e);
  setTimeout(() => e.remove(), 1300);
});
</script>
</body>
</html>
